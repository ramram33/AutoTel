name: NPVT Files Collector

on:
  schedule:
    - cron: '25 1 * * *'
    - cron: '25 4 * * *'
    - cron: '25 7 * * *'
    - cron: '25 10 * * *'
    - cron: '25 13 * * *'
    - cron: '25 16 * * *'
  workflow_dispatch:

jobs:
  collect-npvt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install telethon python-dotenv

      - name: Run NPVT Collector
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
        run: python npvt_collector.py

      - name: Commit tracking file
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add sent_npvt_files.txt || true
          git commit -m "Update npvt tracking - $(date '+%Y-%m-%d %H:%M UTC')" || echo "No changes"
          git push || echo "No push needed"
