name: NPVT Files Collector

on:
  schedule:
    - cron: '0 11 * * *'    # رأس ساعت ۱۱:۰۰ UTC
    - cron: '0 16 * * *'    # رأس ساعت ۱۶:۰۰ UTC
    - cron: '0 22 * * *'    # رأس ساعت ۲۲:۰۰ UTC
  workflow_dispatch:        # امکان اجرای دستی

jobs:
  collect-npvt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}   # برای commit فایل tracking (اگر لازم شد)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install telethon python-dotenv

      - name: Run NPVT Collector
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
        run: python npvt_collector.py

      - name: Commit tracking file (برای حفظ حالت بین اجراها)
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          git add sent_npvt_files.txt || true
          git commit -m "Update npvt tracking file - $(date '+%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push || echo "No push needed"
